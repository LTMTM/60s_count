<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>長者言語流暢度測試錄音計時器</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Microsoft JhengHei', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6',
                            600: '#0d9488',
                            700: '#0f766e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', 'Microsoft JhengHei', -apple-system, BlinkMacSystemFont, sans-serif;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .pulse-ring {
            box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.5);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(20, 184, 166, 0); }
            100% { box-shadow: 0 0 0 0 rgba(20, 184, 166, 0); }
        }
        .timer-warning {
            animation: warningFlash 0.8s ease-in-out infinite alternate;
        }
        @keyframes warningFlash {
            from { color: #f59e0b; }
            to { color: #ef4444; }
        }
        @keyframes bounceOnce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .animate-bounce-once {
            animation: bounceOnce 0.4s ease-out;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen flex flex-col justify-between pb-6">

    <!-- Navigation Header -->
    <header class="bg-slate-900 text-white sticky top-0 z-50 shadow-md">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-teal-500 flex items-center justify-center text-white font-bold">
                    <i class="fa-solid fa-stopwatch"></i>
                </div>
                <h1 class="font-bold text-lg tracking-wide">言語流暢度測驗工具</h1>
            </div>
            <button id="toggleHistoryBtn" class="text-sm bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-full border border-slate-700 flex items-center gap-1.5 transition">
                <i class="fa-solid fa-clock-rotate-left text-teal-400"></i>
                <span>歷史紀錄</span>
            </button>
        </div>
    </header>

    <!-- Main Mobile Container -->
    <main class="max-w-md mx-auto w-full px-4 pt-4 flex-1 flex flex-col gap-4">

        <!-- Case Number Selector -->
        <section class="bg-white rounded-2xl p-3 shadow-sm border border-slate-200/80">
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 flex justify-between items-center">
                <span><i class="fa-solid fa-id-card text-teal-600 mr-1"></i> 請選擇個案編號 (Case Number)</span>
                <span id="selectedCaseBadge" class="text-xs bg-teal-100 text-teal-800 font-extrabold px-2.5 py-0.5 rounded-full">LON001</span>
            </label>
            <div class="flex items-center gap-2">
                <button type="button" id="prevCaseBtn" title="上一個編號" class="bg-slate-100 hover:bg-slate-200 active:scale-95 text-slate-700 font-bold py-2 px-3 rounded-xl transition flex items-center justify-center">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <select id="caseNumberSelect" class="flex-1 bg-slate-50 border-2 border-slate-200 text-slate-800 font-bold py-2 px-3 rounded-xl text-base focus:outline-none focus:border-teal-500 transition cursor-pointer">
                    <!-- Populated dynamically LON001 - LON334 -->
                </select>
                <button type="button" id="nextCaseBtn" title="下一個編號" class="bg-slate-100 hover:bg-slate-200 active:scale-95 text-slate-700 font-bold py-2 px-3 rounded-xl transition flex items-center justify-center">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        </section>

        <!-- Category Selector -->
        <section class="bg-white rounded-2xl p-3 shadow-sm border border-slate-200/80">
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">
                <i class="fa-solid fa-list-check text-teal-600 mr-1"></i> 請選擇測試主題
            </label>
            <div class="grid grid-cols-3 gap-2">
                <button type="button" data-category="動物" class="cat-btn active bg-teal-50 border-2 border-teal-500 text-teal-700 font-bold py-2.5 px-1 rounded-xl flex flex-col items-center gap-1 transition">
                    <span class="text-xl">🐶</span>
                    <span class="text-sm">動物</span>
                </button>
                <button type="button" data-category="水果" class="cat-btn bg-slate-50 border-2 border-transparent text-slate-600 font-semibold py-2.5 px-1 rounded-xl flex flex-col items-center gap-1 transition hover:bg-slate-100">
                    <span class="text-xl">🍎</span>
                    <span class="text-sm">水果</span>
                </button>
                <button type="button" data-category="蔬菜" class="cat-btn bg-slate-50 border-2 border-transparent text-slate-600 font-semibold py-2.5 px-1 rounded-xl flex flex-col items-center gap-1 transition hover:bg-slate-100">
                    <span class="text-xl">🥦</span>
                    <span class="text-sm">蔬菜</span>
                </button>
            </div>
        </section>

        <!-- Timer Card -->
        <section class="bg-white rounded-3xl p-6 shadow-sm border border-slate-200/80 text-center relative overflow-hidden flex flex-col items-center">
            
            <!-- Alert Badge -->
            <div id="statusBadge" class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-slate-100 text-slate-600 mb-2">
                <span class="w-2 h-2 rounded-full bg-slate-400"></span>
                <span id="statusText">準備就緒 (限時 60 秒)</span>
            </div>

            <!-- Big Countdown Display -->
            <div class="relative w-56 h-56 my-2 flex items-center justify-center">
                <!-- SVG Progress Ring -->
                <svg class="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="44" stroke="#e2e8f0" stroke-width="8" fill="none" />
                    <circle id="progressCircle" cx="50" cy="50" r="44" stroke="#14b8a6" stroke-width="8" stroke-dasharray="276.46" stroke-dashoffset="0" stroke-linecap="round" fill="none" class="transition-all duration-200" />
                </svg>
                
                <!-- Time & Cue Indicator inside circle -->
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span id="timerDisplay" class="text-5xl font-extrabold tracking-tight text-slate-800 font-mono">60.0</span>
                    <span class="text-xs font-medium text-slate-400 mt-1">秒</span>
                    <!-- 30s Indicator -->
                    <div id="beep30Notice" class="mt-2 text-xs font-bold text-amber-500 hidden flex items-center gap-1 bg-amber-50 px-2 py-0.5 rounded-full border border-amber-200">
                        <i class="fa-solid fa-bell"></i> 已過 30 秒！
                    </div>
                </div>
            </div>

            <!-- Audio Alert Legend -->
            <div class="flex items-center justify-center gap-4 text-xs text-slate-500 mt-1 mb-4">
                <div class="flex items-center gap-1">
                    <i class="fa-solid fa-hourglass-half text-amber-500"></i>
                    <span>30秒畫面提示</span>
                </div>
                <div class="flex items-center gap-1">
                    <i class="fa-solid fa-circle-stop text-red-500"></i>
                    <span>60秒結束音</span>
                </div>
            </div>

            <!-- Main Control Buttons -->
            <div class="w-full grid grid-cols-2 gap-3 mt-1">
                <button id="startBtn" class="col-span-2 bg-teal-600 hover:bg-teal-700 active:scale-95 text-white font-bold py-4 px-6 rounded-2xl shadow-lg shadow-teal-600/30 text-lg flex items-center justify-center gap-2 transition">
                    <i class="fa-solid fa-play"></i>
                    <span id="startBtnText">開始測試與錄音</span>
                </button>
                <button id="pauseBtn" disabled class="bg-amber-500 hover:bg-amber-600 active:scale-95 text-white font-bold py-3 px-4 rounded-xl shadow text-sm flex items-center justify-center gap-2 transition opacity-50 cursor-not-allowed">
                    <i class="fa-solid fa-pause"></i>
                    <span>暫停</span>
                </button>
                <button id="resetBtn" class="bg-slate-200 hover:bg-slate-300 active:scale-95 text-slate-700 font-bold py-3 px-4 rounded-xl text-sm flex items-center justify-center gap-2 transition">
                    <i class="fa-solid fa-rotate-left"></i>
                    <span>重設</span>
                </button>
            </div>
        </section>

        <!-- Recording Playback & Storage Section -->
        <section id="scoringSection" class="bg-white rounded-3xl p-5 shadow-sm border border-slate-200/80 flex flex-col gap-4">
            <div class="flex items-center justify-between border-b border-slate-100 pb-3">
                <h2 class="font-bold text-slate-800 text-base flex items-center gap-2">
                    <i class="fa-solid fa-microphone-lines text-teal-600"></i> 錄音回放與儲存
                </h2>
                <span id="recStatus" class="text-xs font-semibold text-slate-400">尚未錄音</span>
            </div>

            <!-- Audio Player Widget -->
            <div class="bg-slate-50 p-3 rounded-2xl border border-slate-200 flex flex-col gap-2">
                <audio id="audioPlayback" controls class="w-full h-10 rounded-lg"></audio>
                <div class="flex items-center justify-between px-1 pt-1">
                    <span class="text-xs font-medium text-slate-500">播放速度：</span>
                    <div class="flex gap-1.5">
                        <button type="button" class="speed-btn px-2.5 py-1 text-xs font-bold rounded-lg bg-slate-200 text-slate-700 active:bg-teal-600 active:text-white" data-speed="0.75">0.75x</button>
                        <button type="button" class="speed-btn px-2.5 py-1 text-xs font-bold rounded-lg bg-teal-600 text-white" data-speed="1.0">1.0x (原速)</button>
                        <button type="button" class="speed-btn px-2.5 py-1 text-xs font-bold rounded-lg bg-slate-200 text-slate-700 active:bg-teal-600 active:text-white" data-speed="1.25">1.25x</button>
                    </div>
                </div>
            </div>

            <button id="saveRecordBtn" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 rounded-xl shadow transition text-sm flex items-center justify-center gap-2">
                <i class="fa-solid fa-cloud-arrow-up text-teal-400 text-base"></i>
                <span>儲存並同步至 Google Drive</span>
            </button>
        </section>

    </main>

    <!-- 30 Seconds Big Alert Modal -->
    <div id="notice30Modal" class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl p-6 shadow-2xl max-w-xs w-full text-center space-y-3 border-2 border-amber-400 transform transition-all animate-bounce-once">
            <div class="w-16 h-16 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mx-auto text-3xl shadow-inner">
                <i class="fa-solid fa-hourglass-half"></i>
            </div>
            <h3 class="text-xl font-extrabold text-slate-800">⏰ 已過 30 秒！</h3>
            <p class="text-sm font-semibold text-slate-600">測試時間已滿一半，請繼續回答</p>
            <div class="pt-1 text-xs font-bold text-amber-600 bg-amber-50 rounded-full py-1.5 px-3 inline-flex items-center justify-center gap-1.5 border border-amber-200">
                <i class="fa-solid fa-spinner animate-spin"></i> <span>5 秒後將自動關閉</span>
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div id="historyModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center hidden">
        <div class="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl max-h-[85vh] flex flex-col shadow-2xl overflow-hidden">
            <!-- Modal Header -->
            <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-clock-rotate-left text-teal-600"></i> 測驗歷史紀錄與雲端設定
                </h3>
                <button id="closeHistoryBtn" class="w-8 h-8 rounded-full bg-slate-200 text-slate-600 flex items-center justify-center">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <!-- Modal Content (List) -->
            <div id="historyList" class="p-4 overflow-y-auto flex-1 space-y-3">
                <!-- Dynamic Content Here -->
            </div>

            <div class="p-3 bg-slate-100 border-t border-slate-200 text-xs space-y-2">
                <details class="group" open>
                    <summary class="font-bold text-slate-700 cursor-pointer flex justify-between items-center">
                        <span class="flex items-center gap-1.5"><i class="fa-brands fa-google-drive text-emerald-600"></i> Google Drive 自動同步設定</span>
                        <i class="fa-solid fa-chevron-down text-slate-400 group-open:rotate-180 transition-transform"></i>
                    </summary>
                    <div class="pt-2 space-y-2">
                        <label class="block text-[11px] font-semibold text-slate-600">目標資料夾名稱：</label>
                        <input type="text" id="targetFolderName" value="LON_60s" class="w-full px-2.5 py-1 rounded-lg border border-slate-300 text-xs font-mono focus:outline-none focus:border-teal-500 mb-1">
                        
                        <label class="block text-[11px] font-semibold text-slate-600">Google Apps Script Web App 網址：</label>
                        <input type="url" id="gasUrlInput" value="" placeholder="https://script.google.com/macros/s/.../exec" class="w-full px-2.5 py-1.5 rounded-lg border border-slate-300 text-xs font-mono focus:outline-none focus:border-teal-500">
                    </div>
                </details>
            </div>

            <!-- Modal Footer -->
            <div class="p-3 border-t border-slate-100 bg-slate-50 flex justify-between gap-2">
                <button id="clearHistoryBtn" class="px-3 py-2 text-xs text-red-600 font-semibold hover:bg-red-50 rounded-xl transition">
                    <i class="fa-solid fa-trash-can mr-1"></i>清空紀錄
                </button>
                <button id="exportCsvBtn" class="px-4 py-2 text-xs bg-teal-600 text-white font-bold rounded-xl shadow hover:bg-teal-700 transition flex items-center gap-1">
                    <i class="fa-solid fa-file-csv"></i> 匯出 CSV 檔
                </button>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed top-16 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white text-xs font-semibold px-4 py-2.5 rounded-full shadow-lg opacity-0 pointer-events-none transition-opacity duration-300 z-50 flex items-center gap-2">
        <i id="toastIcon" class="fa-solid fa-circle-check text-teal-400"></i>
        <span id="toastMsg">已儲存紀錄</span>
    </div>

    <script>
        let db = null;
        const DB_NAME = 'VerbalFluencyAudioDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'audioFiles';

        let currentCaseNumber = 'LON001';
        const caseNumberSelect = document.getElementById('caseNumberSelect');
        const selectedCaseBadge = document.getElementById('selectedCaseBadge');
        const prevCaseBtn = document.getElementById('prevCaseBtn');
        const nextCaseBtn = document.getElementById('nextCaseBtn');

        function initCaseNumbers() {
            if (!caseNumberSelect) return;
            caseNumberSelect.innerHTML = '';
            for (let i = 1; i <= 334; i++) {
                const numStr = `LON${String(i).padStart(3, '0')}`;
                const opt = document.createElement('option');
                opt.value = numStr;
                opt.textContent = numStr;
                caseNumberSelect.appendChild(opt);
            }
            const saved = localStorage.getItem('last_selected_case');
            if (saved && caseNumberSelect.querySelector(`option[value="${saved}"]`)) {
                caseNumberSelect.value = saved;
                currentCaseNumber = saved;
            } else {
                currentCaseNumber = 'LON001';
            }
            updateCaseBadge();
        }

        function updateCaseBadge() {
            currentCaseNumber = caseNumberSelect.value;
            if (selectedCaseBadge) selectedCaseBadge.textContent = currentCaseNumber;
            localStorage.setItem('last_selected_case', currentCaseNumber);
        }

        if (caseNumberSelect) {
            caseNumberSelect.addEventListener('change', updateCaseBadge);
        }
        if (prevCaseBtn) {
            prevCaseBtn.addEventListener('click', () => {
                if (caseNumberSelect.selectedIndex > 0) {
                    caseNumberSelect.selectedIndex--;
                    updateCaseBadge();
                }
            });
        }
        if (nextCaseBtn) {
            nextCaseBtn.addEventListener('click', () => {
                if (caseNumberSelect.selectedIndex < caseNumberSelect.options.length - 1) {
                    caseNumberSelect.selectedIndex++;
                    updateCaseBadge();
                }
            });
        }

        function initIndexedDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains(STORE_NAME)) {
                        database.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
                req.onsuccess = (e) => {
                    db = e.target.result;
                    resolve(db);
                };
                req.onerror = (e) => reject(e);
            });
        }

        async function saveAudioBlob(id, blob) {
            if (!db) await initIndexedDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.put({ id: id, blob: blob });
                tx.oncomplete = () => resolve();
                tx.onerror = (e) => reject(e);
            });
        }

        async function getAudioBlob(id) {
            if (!db) await initIndexedDB();
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const req = store.get(id);
                req.onsuccess = () => resolve(req.result ? req.result.blob : null);
                req.onerror = () => resolve(null);
            });
        }

        async function clearAllAudioBlobs() {
            if (!db) await initIndexedDB();
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.clear();
                tx.oncomplete = () => resolve();
            });
        }

        let audioCtx = null;

        function initAudioContext() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playBeepTone(type) {
            initAudioContext();
            if (!audioCtx) return;

            if (type === 'end') {
                playToneSequence([
                    { freq: 523.25, duration: 0.15, delay: 0 },
                    { freq: 659.25, duration: 0.15, delay: 0.18 },
                    { freq: 783.99, duration: 0.5, delay: 0.36 }
                ]);
            }
        }

        function playToneSequence(tones) {
            tones.forEach(t => {
                setTimeout(() => {
                    try {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();

                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(t.freq, audioCtx.currentTime);

                        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + t.duration);

                        osc.connect(gain);
                        gain.connect(audioCtx.destination);

                        osc.start();
                        osc.stop(audioCtx.currentTime + t.duration);
                    } catch (e) {
                        console.error('Audio play error:', e);
                    }
                }, t.delay * 1000);
            });
        }

        const TOTAL_TIME = 60.0;
        let timeRemaining = TOTAL_TIME;
        let timerInterval = null;
        let isRunning = false;
        let currentCategory = '動物';
        const categories = ['動物', '水果', '蔬菜'];
        let beep30Triggered = false;
        let notice30Timeout = null;
        let autoUploadOnFinish = false;

        // MediaRecorder Variables
        let mediaRecorder = null;
        let audioChunks = [];
        let recordedAudioBlob = null;
        let recordedAudioUrl = null;

        // DOM Elements
        const timerDisplay = document.getElementById('timerDisplay');
        const progressCircle = document.getElementById('progressCircle');
        const startBtn = document.getElementById('startBtn');
        const startBtnText = document.getElementById('startBtnText');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusBadge = document.getElementById('statusBadge');
        const statusText = document.getElementById('statusText');
        const beep30Notice = document.getElementById('beep30Notice');

        const audioPlayback = document.getElementById('audioPlayback');
        const recStatus = document.getElementById('recStatus');
        const gasUrlInput = document.getElementById('gasUrlInput');
        const targetFolderNameInput = document.getElementById('targetFolderName');
        const saveRecordBtn = document.getElementById('saveRecordBtn');

        const notice30Modal = document.getElementById('notice30Modal');
        const historyModal = document.getElementById('historyModal');
        const toggleHistoryBtn = document.getElementById('toggleHistoryBtn');
        const closeHistoryBtn = document.getElementById('closeHistoryBtn');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const exportCsvBtn = document.getElementById('exportCsvBtn');

        const CIRCLE_CIRCUMFERENCE = 2 * Math.PI * 44;

        function updateTimerUI() {
            timerDisplay.textContent = timeRemaining.toFixed(1);
            
            const fraction = timeRemaining / TOTAL_TIME;
            const strokeDashoffset = CIRCLE_CIRCUMFERENCE * (1 - fraction);
            progressCircle.style.strokeDashoffset = strokeDashoffset;

            if (timeRemaining <= 10) {
                progressCircle.setAttribute('stroke', '#ef4444');
                timerDisplay.classList.add('timer-warning');
            } else if (timeRemaining <= 30) {
                progressCircle.setAttribute('stroke', '#f59e0b');
                timerDisplay.classList.remove('timer-warning');
            } else {
                progressCircle.setAttribute('stroke', '#14b8a6');
                timerDisplay.classList.remove('timer-warning');
            }
        }

        function switchToNextCategory() {
            const currentIndex = categories.indexOf(currentCategory);
            const nextIndex = (currentIndex + 1) % categories.length;
            currentCategory = categories[nextIndex];

            document.querySelectorAll('.cat-btn').forEach(btn => {
                if (btn.dataset.category === currentCategory) {
                    btn.classList.add('active', 'bg-teal-50', 'border-teal-500', 'text-teal-700');
                    btn.classList.remove('bg-slate-50', 'border-transparent', 'text-slate-600');
                } else {
                    btn.classList.remove('active', 'bg-teal-50', 'border-teal-500', 'text-teal-700');
                    btn.classList.add('bg-slate-50', 'border-transparent', 'text-slate-600');
                }
            });
        }

        async function startRecording() {
            audioChunks = [];
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = async () => {
                    recordedAudioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    if (recordedAudioUrl) {
                        URL.revokeObjectURL(recordedAudioUrl);
                    }
                    recordedAudioUrl = URL.createObjectURL(recordedAudioBlob);
                    audioPlayback.src = recordedAudioUrl;
                    recStatus.textContent = "錄音已完成";
                    recStatus.className = "text-xs font-semibold text-teal-600";

                    if (autoUploadOnFinish) {
                        autoUploadOnFinish = false;
                        await autoSaveAndUpload();
                        
                        // 自動切換到下一個種類
                        switchToNextCategory();
                        
                        timeRemaining = TOTAL_TIME;
                        updateTimerUI();
                        
                        statusBadge.className = "inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-slate-100 text-slate-600 mb-2";
                        statusText.textContent = `準備就緒 (已自動切換至：${currentCategory})`;
                    }
                };

                mediaRecorder.start();
                recStatus.textContent = "🎙️ 錄音中...";
                recStatus.className = "text-xs font-semibold text-red-500 animate-pulse";
            } catch (err) {
                console.warn('Microphone access denied or not supported:', err);
                recStatus.textContent = "無麥克風權限 (僅計時)";
                recStatus.className = "text-xs font-semibold text-amber-600";
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }
        }

        function show30sNoticeModal() {
            if (!notice30Modal) return;
            notice30Modal.classList.remove('hidden');
            if (notice30Timeout) clearTimeout(notice30Timeout);
            notice30Timeout = setTimeout(() => {
                notice30Modal.classList.add('hidden');
            }, 5000);
        }

        function startTest() {
            initAudioContext();
            if (isRunning) return;

            isRunning = true;
            startBtn.disabled = true;
            startBtn.classList.add('opacity-50', 'cursor-not-allowed');
            pauseBtn.disabled = false;
            pauseBtn.classList.remove('opacity-50', 'cursor-not-allowed');

            statusBadge.className = "inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-teal-100 text-teal-700 pulse-ring mb-2";
            statusText.textContent = "測試與錄音中...";

            if (timeRemaining === TOTAL_TIME) {
                beep30Triggered = false;
                beep30Notice.classList.add('hidden');
                if (notice30Modal) notice30Modal.classList.add('hidden');
                startRecording();
            }

            const startTime = Date.now() - (TOTAL_TIME - timeRemaining) * 1000;

            timerInterval = setInterval(() => {
                const elapsedSeconds = (Date.now() - startTime) / 1000;
                timeRemaining = Math.max(0, TOTAL_TIME - elapsedSeconds);

                if (timeRemaining <= 30.0 && !beep30Triggered) {
                    beep30Triggered = true;
                    show30sNoticeModal();
                    beep30Notice.classList.remove('hidden');
                }

                if (timeRemaining <= 0) {
                    finishTest();
                }

                updateTimerUI();
            }, 50);
        }

        function pauseTest() {
            if (!isRunning) return;
            clearInterval(timerInterval);
            isRunning = false;

            startBtn.disabled = false;
            startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            startBtnText.textContent = "繼續測試";
            pauseBtn.disabled = true;
            pauseBtn.classList.add('opacity-50', 'cursor-not-allowed');

            statusBadge.className = "inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-amber-100 text-amber-700 mb-2";
            statusText.textContent = "已暫停";
        }

        function finishTest() {
            clearInterval(timerInterval);
            timeRemaining = 0;
            isRunning = false;

            playBeepTone('end');
            autoUploadOnFinish = true;
            stopRecording();

            if (notice30Timeout) clearTimeout(notice30Timeout);
            if (notice30Modal) notice30Modal.classList.add('hidden');

            startBtn.disabled = false;
            startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            startBtnText.textContent = "開始測試與錄音";
            pauseBtn.disabled = true;
            pauseBtn.classList.add('opacity-50', 'cursor-not-allowed');

            statusBadge.className = "inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-red-100 text-red-700 mb-2";
            statusText.textContent = "測試已結束 (60秒)";
        }

        function resetTest() {
            clearInterval(timerInterval);
            autoUploadOnFinish = false;
            stopRecording();
            isRunning = false;
            timeRemaining = TOTAL_TIME;
            beep30Triggered = false;

            if (notice30Timeout) clearTimeout(notice30Timeout);
            if (notice30Modal) notice30Modal.classList.add('hidden');

            startBtn.disabled = false;
            startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            startBtnText.textContent = "開始測試與錄音";
            pauseBtn.disabled = true;
            pauseBtn.classList.add('opacity-50', 'cursor-not-allowed');

            statusBadge.className = "inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-slate-100 text-slate-600 mb-2";
            statusText.textContent = "準備就緒 (限時 60 秒)";
            beep30Notice.classList.add('hidden');

            recStatus.textContent = "尚未錄音";
            recStatus.className = "text-xs font-semibold text-slate-400";
            audioPlayback.src = "";

            updateTimerUI();
        }

        gasUrlInput.value = localStorage.getItem('gas_url') || '';
        targetFolderNameInput.value = localStorage.getItem('gas_folder') || 'LON_60s';

        gasUrlInput.addEventListener('change', () => {
            localStorage.setItem('gas_url', gasUrlInput.value.trim());
            showToast('💾 已儲存 Google Apps Script 網址');
        });

        targetFolderNameInput.addEventListener('change', () => {
            localStorage.setItem('gas_folder', targetFolderNameInput.value.trim() || 'LON_60s');
            showToast('📁 已儲存雲端資料夾名稱');
        });

        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        async function uploadToGoogleDrive(recordData, audioBlob) {
            const gasUrl = gasUrlInput.value.trim() || localStorage.getItem('gas_url');
            const folderName = targetFolderNameInput.value.trim() || 'LON_60s';

            if (!gasUrl) {
                showToast('⚠️ 請先在右上角「歷史紀錄」填寫 Google Web App 網址');
                historyModal.classList.remove('hidden');
                return false;
            }

            try {
                showToast(`☁️ 正在上傳至 Google Drive (${folderName})...`);
                let audioBase64 = null;
                if (audioBlob) {
                    audioBase64 = await blobToBase64(audioBlob);
                }

                const dateStr = new Date().toISOString().slice(0, 10);
                const fileName = `${recordData.caseNumber || 'LON'}_${recordData.category}_${dateStr}.webm`;

                const payload = {
                    folderName: folderName,
                    caseNumber: recordData.caseNumber || currentCaseNumber,
                    category: recordData.category,
                    date: recordData.date,
                    fileName: fileName,
                    audioBase64: audioBase64
                };

                await fetch(gasUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8'
                    },
                    body: JSON.stringify(payload)
                });

                showToast(`✅ 已順利同步上傳至 Google Drive【${folderName}】資料夾！`);
                return true;
            } catch (err) {
                console.error('GAS Upload Error:', err);
                showToast('❌ 上傳失敗，請檢查網址設定');
                return false;
            }
        }

        const STORAGE_KEY = 'verbal_fluency_records_v1';

        function getRecords() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.cat-btn').forEach(b => {
                    b.classList.remove('active', 'bg-teal-50', 'border-teal-500', 'text-teal-700');
                    b.classList.add('bg-slate-50', 'border-transparent', 'text-slate-600');
                });
                btn.classList.add('active', 'bg-teal-50', 'border-teal-500', 'text-teal-700');
                btn.classList.remove('bg-slate-50', 'border-transparent', 'text-slate-600');
                currentCategory = btn.dataset.category;
            });
        });

        document.querySelectorAll('.speed-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const speed = parseFloat(btn.dataset.speed);
                audioPlayback.playbackRate = speed;
                document.querySelectorAll('.speed-btn').forEach(b => {
                    b.classList.remove('bg-teal-600', 'text-white');
                    b.classList.add('bg-slate-200', 'text-slate-700');
                });
                btn.classList.remove('bg-slate-200', 'text-slate-700');
                btn.classList.add('bg-teal-600', 'text-white');
            });
        });

        async function renderHistoryList() {
            const records = getRecords();
            historyList.innerHTML = '';
            if (records.length === 0) {
                historyList.innerHTML = '<div class="text-center text-slate-400 py-8 text-sm">尚無任何測驗紀錄</div>';
                return;
            }

            for (const item of records) {
                const card = document.createElement('div');
                card.className = 'bg-slate-50 p-3 rounded-2xl border border-slate-200 text-xs space-y-2';
                
                let audioHtml = '';
                if (item.hasAudio) {
                    audioHtml = `<div class="mt-2 pt-2 border-t border-slate-200 flex flex-col gap-1">
                        <div class="flex items-center justify-between">
                            <span class="font-bold text-slate-600"><i class="fa-solid fa-volume-high text-teal-600 mr-1"></i>錄音檔：</span>
                            <button data-id="${item.id}" class="play-hist-audio text-teal-600 font-bold hover:underline flex items-center gap-1">
                                <i class="fa-solid fa-play"></i> 載入播放
                            </button>
                        </div>
                        <audio id="hist-audio-${item.id}" controls class="w-full h-8 hidden mt-1"></audio>
                    </div>`;
                } else {
                    audioHtml = `<div class="text-slate-400 text-[11px] mt-1">無錄音檔</div>`;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-1.5">
                            <span class="font-extrabold text-teal-800 bg-teal-100 px-2 py-0.5 rounded-lg text-xs">${item.caseNumber || '無編號'}</span>
                            <span class="font-bold text-slate-800 text-sm">${item.category}測試</span>
                        </div>
                        <span class="text-slate-400 text-[11px]">${item.date}</span>
                    </div>
                    ${audioHtml}
                `;
                historyList.appendChild(card);
            }

            document.querySelectorAll('.play-hist-audio').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = parseInt(btn.dataset.id);
                    const audioEl = document.getElementById(`hist-audio-${id}`);
                    if (audioEl) {
                        if (!audioEl.src) {
                            const blob = await getAudioBlob(id);
                            if (blob) {
                                audioEl.src = URL.createObjectURL(blob);
                            } else {
                                showToast('❌ 找不到錄音檔');
                                return;
                            }
                        }
                        audioEl.classList.remove('hidden');
                        audioEl.play();
                    }
                });
            });
        }

        async function clearHistory() {
            localStorage.removeItem(STORAGE_KEY);
            await clearAllAudioBlobs();
            renderHistoryList();
            showToast('🗑️ 已清空歷史紀錄');
        }

        function exportCsv() {
            const records = getRecords();
            if (records.length === 0) {
                showToast('❌ 目前無紀錄可匯出');
                return;
            }
            let csvContent = "\uFEFF測驗時間,個案編號,測驗類別\n";
            records.forEach(r => {
                csvContent += `"${r.date}","${r.caseNumber || ''}","${r.category}"\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `言語流暢度測驗紀錄_${new Date().toISOString().slice(0,10)}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showToast('📊 已匯出 CSV 檔案');
        }

        async function autoSaveAndUpload() {
            if (!recordedAudioBlob) return;

            const recordId = Date.now();
            const dateStr = new Date().toLocaleString('zh-TW', { hour12: false });

            const record = {
                id: recordId,
                date: dateStr,
                caseNumber: currentCaseNumber,
                category: currentCategory,
                hasAudio: true
            };

            try {
                await saveAudioBlob(recordId, recordedAudioBlob);
            } catch (e) {
                console.error('IndexedDB save error:', e);
            }

            const records = getRecords();
            records.unshift(record);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));

            renderHistoryList();

            showToast(`🎉 60秒測試結束！已自動儲存 (${currentCaseNumber} - ${currentCategory})`);
            
            // 自動背景同步 Google Drive
            uploadToGoogleDrive(record, recordedAudioBlob);

            return record;
        }

        async function saveRecord() {
            if (!recordedAudioBlob) {
                showToast('⚠️ 目前沒有可儲存的錄音');
                return;
            }

            const recordId = Date.now();
            const dateStr = new Date().toLocaleString('zh-TW', { hour12: false });

            const record = {
                id: recordId,
                date: dateStr,
                caseNumber: currentCaseNumber,
                category: currentCategory,
                hasAudio: true
            };

            try {
                await saveAudioBlob(recordId, recordedAudioBlob);
            } catch (e) {
                console.error('IndexedDB save error:', e);
            }

            const records = getRecords();
            records.unshift(record);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));

            showToast(`✅ 成功儲存紀錄！(${currentCaseNumber})`);
            renderHistoryList();

            // Trigger Google Drive Upload
            uploadToGoogleDrive(record, recordedAudioBlob);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            toastMsg.textContent = message;
            toast.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 2500);
        }

        startBtn.addEventListener('click', startTest);
        pauseBtn.addEventListener('click', pauseTest);
        resetBtn.addEventListener('click', resetTest);
        saveRecordBtn.addEventListener('click', saveRecord);

        toggleHistoryBtn.addEventListener('click', () => {
            renderHistoryList();
            historyModal.classList.remove('hidden');
        });
        closeHistoryBtn.addEventListener('click', () => {
            historyModal.classList.add('hidden');
        });
        clearHistoryBtn.addEventListener('click', clearHistory);
        exportCsvBtn.addEventListener('click', exportCsv);

        // Initialize Case Numbers & UI
        initCaseNumbers();
        updateTimerUI();
    </script>
</body>
</html>
